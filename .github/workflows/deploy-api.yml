name: Deploy API to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - 'ExamPrep/src/**'
      - 'ExamPrep/ExamPrep.slnx'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ExamPrep/ExamPrep.slnx

      - name: Build
        run: dotnet build ExamPrep/ExamPrep.slnx -c Release --no-restore

      - name: Publish
        run: dotnet publish ExamPrep/src/ExamPrep.API/ExamPrep.API.csproj -c Release -o ./publish --no-restore

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
